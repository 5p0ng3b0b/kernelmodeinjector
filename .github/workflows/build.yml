name: Build C++ Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # - name: Install WDK via Chocolatey
    #  run: |
    #    choco install windowsdriverkit10 -y

    # - name: Set WDK Environment Variables
    #  run: |
    #    $WdkPath = "C:\Program Files (x86)\Windows Kits\10"
    #    $WdkVersion = "10.0.22621.0"
    #    echo "INCLUDE=$WdkPath\Include\$WdkVersion\km;$WdkPath\Include\$WdkVersion\shared;$env:INCLUDE" >> $env:GITHUB_ENV
    #    echo "LIB=$WdkPath\Lib\$WdkVersion\km\x64;$env:LIB" >> $env:GITHUB_ENV

    - name: Install WDK via dotnet
      run: dotnet add package Microsoft.Windows.WDK.x64 --version 10.0.28000.1839

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore kernelmode.sln

    - name: Build Release|x64
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=Release /p:Platform=x64 kernelmode.sln

    - name: List build artifacts
      run: |
        Get-ChildItem -Recurse -Include "*.exe","*.dll","*.sys" ${{env.GITHUB_WORKSPACE}}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-Release-x64
        path: |
          **/Release/**/*.exe
          **/Release/**/*.dll
          **/Release/**/*.sys
        if-no-files-found: ignore
