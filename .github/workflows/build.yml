name: Build C++ Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    steps:
    - uses: actions/checkout@v4

    - name: Install Windows Driver Kit (WDK)
      run: |
        # Download WDK installer
        $WdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
        $WdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $WdkUrl -OutFile $WdkInstaller
        
        # Install WDK silently
        Start-Process -FilePath $WdkInstaller -ArgumentList "/q" -Wait
        
        # Add WDK to PATH
        $WdkPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64"
        echo "WDK_PATH=$WdkPath" >> $env:GITHUB_ENV

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore kernelmode.sln

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{matrix.configuration}} /p:Platform=${{matrix.platform}} kernelmode.sln

    - name: List build artifacts
      run: |
        Get-ChildItem -Recurse -Include "*.exe","*.dll","*.sys" ${{env.GITHUB_WORKSPACE}}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{matrix.configuration}}-${{matrix.platform}}
        path: |
          **/Debug/**/*.exe
          **/Debug/**/*.dll
          **/Debug/**/*.sys
          **/Release/**/*.exe
          **/Release/**/*.dll
          **/Release/**/*.sys
        if-no-files-found: ignore
        
