name: Build C++ Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Windows Driver Kit (WDK)
      run: |
        # Download WDK for Windows 11
        $WdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
        $WdkInstaller = "$env:TEMP\wdksetup.exe"
        Write-Host "Downloading WDK..."
        Invoke-WebRequest -Uri $WdkUrl -OutFile $WdkInstaller -ErrorAction Stop
        
        # Install WDK silently
        Write-Host "Installing WDK..."
        & $WdkInstaller /q /norestart
        Start-Sleep -Seconds 60

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore kernelmode.sln

    - name: Build Release|x64
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=Release /p:Platform=x64 kernelmode.sln

    - name: List build artifacts
      run: |
        Get-ChildItem -Recurse -Include "*.exe","*.dll","*.sys" ${{env.GITHUB_WORKSPACE}}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-Release-x64
        path: |
          **/Release/**/*.exe
          **/Release/**/*.dll
          **/Release/**/*.sys
        if-no-files-found: ignore
